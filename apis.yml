aid: bancomat
name: Bancomat
description: >-
  BANCOMAT S.p.A. is Italy's leading payment network operator managing the PagoBancomat debit
  card scheme, ATM network, and BANCOMAT Pay mobile payment service. Launched in 1983 for ATM
  withdrawals and expanded in 1986 with PagoBancomat for PIN-based POS payments, the network
  underpins Italian electronic payment infrastructure. BANCOMAT Pay, introduced in 2019, enables
  mobile e-commerce and P2P payments linked to bank accounts via phone number and IBAN.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ATM
  - Banking
  - Financial Services
  - Italy
  - Mobile Payments
  - Payments
  - Debit Cards
url: https://raw.githubusercontent.com/api-evangelist/bancomat/refs/heads/main/apis.yml
