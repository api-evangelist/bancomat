modified: '2026-04-21'
specificationVersion: '0.19'
apis:
  - aid: bancomat:bancomat-pay
    name: BANCOMAT Pay
    description: >-
      BANCOMAT Pay is a mobile payment service enabling Italian consumers to make e-commerce
      purchases and P2P transfers through a smartphone app linked to their bank account by
      phone number and IBAN. Merchant integration is typically handled through PSPs such as
      Nexi, Axerve, PPRO, and HiPay rather than a direct public API.
    humanURL: https://bancomat.it/en/bancomat-pay
    tags:
      - Mobile Payments
      - P2P
      - Payments
      - Italy
    properties:
      - type: Documentation
        url: https://bancomat.it/en/bancomat-pay
      - type: Documentation
        url: https://developer.nexigroup.com/xpayglobal/en-EU/docs/bancomat-pay/
        name: Nexi Integration Guide
